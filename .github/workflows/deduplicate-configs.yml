name: Process WireGuard Configs

on:
  push:
    paths:
      - 'ALL.txt'
  workflow_dispatch:

jobs:
  process-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Deduplicate, sort, generate Clash configs and WireGuard conf files
        shell: python
        run: |
          import re, os, yaml, zipfile
          from urllib.parse import unquote

          FILES = ["ALL.txt", "MCI.txt", "MTN.txt"]
          OUTPUT_FILES = ["ALL.yaml", "MCI.yaml", "MTN.yaml"]
          CONF_DIR = "wireguard_configs"

          BASE_CONFIG = {
              "name": "Standard",
              "mixed-port": 7890,
              "socks-port": 7891,
              "port": 7892,
              "allow-lan": True,
              "bind-address": "*",
              "mode": "global",
              "log-level": "info",
              "ipv6": True,
              "external-controller": "127.0.0.1:9090",
              "external-ui": "ui",
              "secret": "",
              "unified-delay": True,
              "tcp-concurrent": True,
              "global-client-fingerprint": "chrome",
              "find-process-mode": "strict",
              "keep-alive-interval": 15,
              "profile": {
                  "store-selected": True,
                  "store-fake-ip": False
              },
              "dns": {
                  "enable": True,
                  "ipv6": True,
                  "listen": "0.0.0.0:5353",
                  "enhanced-mode": "fake-ip",
                  "fake-ip-range": "198.18.0.1/16",
                  "fake-ip-filter": [
                      "*.local",
                      "*.lan",
                      "*.localhost",
                      "+.stun.*.*",
                      "+.stun.*.*.*",
                      "time.*",
                      "time.*.com",
                      "connectivitycheck.gstatic.com",
                      "detectportal.firefox.com",
                      "captive.apple.com",
                      "www.msftncsi.com",
                      "cp.cloudflare.com"
                  ],
                  "default-nameserver": [
                      "1.1.1.1", "1.0.0.1", "8.8.8.8", "8.8.4.4",
                      "9.9.9.9", "149.112.112.112",
                      "208.67.222.222", "208.67.220.220",
                      "94.140.14.14", "94.140.15.15",
                      "64.6.64.6", "64.6.65.6",
                      "84.200.69.80", "84.200.70.40",
                      "76.76.19.19", "76.223.122.150",
                      "8.26.56.26", "8.20.247.20"
                  ],
                  "nameserver": [
                      "https://cloudflare-dns.com/dns-query",
                      "https://1.1.1.1/dns-query",
                      "https://1.0.0.1/dns-query",
                      "https://dns.google/dns-query",
                      "https://8.8.8.8/dns-query",
                      "https://8.8.4.4/dns-query",
                      "https://dns.quad9.net/dns-query",
                      "https://9.9.9.9/dns-query",
                      "https://149.112.112.112/dns-query",
                      "https://dns.adguard.com/dns-query",
                      "https://94.140.14.14/dns-query",
                      "https://94.140.15.15/dns-query",
                      "https://doh.opendns.com/dns-query",
                      "https://208.67.222.222/dns-query",
                      "https://208.67.220.220/dns-query",
                      "https://doh.comodo.com/dns-query",
                      "https://8.26.56.26/dns-query",
                      "https://8.20.247.20/dns-query",
                      "https://doh.mullvad.net/dns-query",
                      "https://doh.dns.mullvad.net/dns-query",
                      "https://freedns.controld.com/p0",
                      "https://freedns.controld.com/family",
                      "tls://1.1.1.1:853", "tls://1.0.0.1:853",
                      "tls://8.8.8.8:853", "tls://8.8.4.4:853",
                      "tls://9.9.9.9:853", "tls://149.112.112.112:853",
                      "tls://94.140.14.14:853", "tls://94.140.15.15:853",
                      "tls://208.67.222.222:853", "tls://208.67.220.220:853",
                      "tls://family-filter-dns.cleanbrowsing.org:853",
                      "tls://adult-filter-dns.cleanbrowsing.org:853",
                      "tls://security-filter-dns.cleanbrowsing.org:853",
                      "1.1.1.1", "1.0.0.1", "8.8.8.8", "8.8.4.4",
                      "9.9.9.9", "149.112.112.112",
                      "208.67.222.222", "208.67.220.220",
                      "94.140.14.14", "94.140.15.15",
                      "64.6.64.6", "64.6.65.6",
                      "84.200.69.80", "84.200.70.40",
                      "8.26.56.26", "8.20.247.20",
                      "76.76.19.19", "76.223.122.150",
                      "208.67.222.123", "208.67.220.123",
                      "195.46.39.39", "195.46.39.40",
                      "38.132.106.139", "194.187.251.67"
                  ]
              },
              "proxies": [],
              "proxy-groups": [
                  {
                      "name": "PROXY",
                      "type": "select",
                      "proxies": ["Fallback", "Auto", "Load Balance"]
                  },
                  {
                      "name": "Load Balance",
                      "type": "load-balance",
                      "strategy": "consistent-hashing",
                      "url": "http://www.gstatic.com/generate_204",
                      "interval": 60,
                      "tolerance": 50,
                      "lazy": True,
                      "proxies": []
                  },
                  {
                      "name": "Auto",
                      "type": "url-test",
                      "url": "http://www.gstatic.com/generate_204",
                      "interval": 60,
                      "tolerance": 50,
                      "lazy": True,
                      "proxies": []
                  },
                  {
                      "name": "Fallback",
                      "type": "fallback",
                      "url": "http://www.gstatic.com/generate_204",
                      "interval": 60,
                      "lazy": True,
                      "proxies": []
                  }
              ],
              "rules": ["MATCH,PROXY"]
          }

          def parse_wireguard_config(line):
              decoded = unquote(line)
              match = re.match(r'wireguard://([^@]+)@([^:]+):(\d+)\?(.+?)(?:#(.+))?$', decoded)
              if not match:
                  return None
              
              private_key = match.group(1)
              address = match.group(2)
              port = int(match.group(3))
              params = match.group(4)
              
              params_dict = {}
              for param in params.split('&'):
                  if '=' in param:
                      key, value = param.split('=', 1)
                      params_dict[key] = value
              
              mtu_raw = params_dict.get('mtu', '1280')
              mtu_match = re.match(r'(\d+)', mtu_raw)
              mtu = int(mtu_match.group(1)) if mtu_match else 1280
              
              keepalive_raw = params_dict.get('keepalive', '5')
              keepalive_match = re.match(r'(\d+)', keepalive_raw)
              keepalive = int(keepalive_match.group(1)) if keepalive_match else 5
              
              addresses_raw = params_dict.get('address', '')
              addresses = []
              for addr in addresses_raw.split(','):
                  addr = addr.strip()
                  if addr:
                      addresses.append(addr)
              
              reserved_raw = params_dict.get('reserved', '0,0,0')
              reserved = []
              for r in reserved_raw.split(','):
                  r = r.strip()
                  if r:
                      reserved.append(int(r))
              
              wpayloadsize_raw = params_dict.get('wpayloadsize', '')
              jc = 5
              jmin = 50
              jmax = 100
              s1 = 0
              s2 = 0
              h1 = 1
              h2 = 2
              h3 = 3
              h4 = 4
              
              if wpayloadsize_raw:
                  parts = wpayloadsize_raw.split('-')
                  if len(parts) == 2:
                      s1 = int(parts[0])
                      s2 = int(parts[1])
              
              wnoisecount_raw = params_dict.get('wnoisecount', '15')
              wnoisecount_match = re.match(r'(\d+)', wnoisecount_raw)
              jc = int(wnoisecount_match.group(1)) if wnoisecount_match else 15
              
              wnoisedelay_raw = params_dict.get('wnoisedelay', '1-2')
              delay_parts = wnoisedelay_raw.split('-')
              if len(delay_parts) == 2:
                  jmin = int(delay_parts[0])
                  jmax = int(delay_parts[1])
              
              return {
                  'private_key': private_key,
                  'address': address,
                  'port': port,
                  'public_key': params_dict.get('publickey', ''),
                  'preshared_key': params_dict.get('presharedkey', ''),
                  'addresses': addresses,
                  'mtu': mtu,
                  'keepalive': keepalive,
                  'reserved': reserved,
                  'jc': jc,
                  'jmin': jmin,
                  'jmax': jmax,
                  's1': s1,
                  's2': s2,
                  'h1': h1,
                  'h2': h2,
                  'h3': h3,
                  'h4': h4,
                  'endpoint': f"{address}:{port}"
              }

          def generate_proxy_name(endpoint, index):
              safe_name = re.sub(r'[^a-zA-Z0-9\-]', '-', endpoint)
              return f"WG-{safe_name}-{index}"

          def generate_conf_file(config, filename):
              conf = f"""[Interface]
          PrivateKey = {config['private_key']}
          Address = {', '.join(config['addresses'])}
          DNS = 1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001
          MTU = {config['mtu']}
          Jc = {config['jc']}
          Jmin = {config['jmin']}
          Jmax = {config['jmax']}
          S1 = {config['s1']}
          S2 = {config['s2']}
          H1 = {config['h1']}
          H2 = {config['h2']}
          H3 = {config['h3']}
          H4 = {config['h4']}
          [Peer]
          PublicKey = {config['public_key']}
          AllowedIPs = 0.0.0.0/0, ::/0
          Endpoint = {config['endpoint']}
          PersistentKeepalive = {config['keepalive']}
          """
              if config['preshared_key']:
                  conf = conf.replace('[Peer]\n', f'[Peer]\nPresharedKey = {config["preshared_key"]}\n')
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(conf.strip() + '\n')

          def write_yaml(config, filepath):
              class CustomDumper(yaml.Dumper):
                  def increase_indent(self, flow=False, indentless=False):
                      return super(CustomDumper, self).increase_indent(flow, False)
              
              with open(filepath, 'w', encoding='utf-8') as f:
                  yaml.dump(config, f, Dumper=CustomDumper, 
                            default_flow_style=False, 
                            allow_unicode=True, 
                            sort_keys=False,
                            indent=2)

          os.makedirs(CONF_DIR, exist_ok=True)
          
          for f in os.listdir(CONF_DIR):
              os.remove(os.path.join(CONF_DIR, f))

          conf_counter = 0

          for i, filename in enumerate(FILES):
              if not os.path.exists(filename):
                  print(f"File {filename} not found, skipping...")
                  continue
              
              seen_endpoints = set()
              unique_configs = []
              
              with open(filename, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if not line.startswith("wireguard://"):
                          continue
                      match = re.search(r'@([^?#]+)', line)
                      if not match:
                          continue
                      endpoint = match.group(1)
                      if endpoint not in seen_endpoints:
                          seen_endpoints.add(endpoint)
                          unique_configs.append((endpoint, line))
              
              if unique_configs:
                  unique_configs.sort(key=lambda x: x[0])
                  with open(filename, 'w', encoding='utf-8') as f:
                      for _, cfg in unique_configs:
                          f.write(cfg + "\n")
                  print(f"{filename}: {len(unique_configs)} unique configs written")
              
              proxies = []
              proxy_names = []
              
              for endpoint, cfg in unique_configs:
                  config = parse_wireguard_config(cfg)
                  if config:
                      conf_counter += 1
                      conf_name = f"@DeltaKroneckerGithub ({conf_counter}).conf"
                      conf_path = os.path.join(CONF_DIR, conf_name)
                      generate_conf_file(config, conf_path)
                      
                      proxy_name = generate_proxy_name(config['endpoint'], len(proxies))
                      proxy_names.append(proxy_name)
                      
                      proxy = {
                          'name': proxy_name,
                          'type': 'wireguard',
                          'server': config['address'],
                          'port': config['port'],
                          'private-key': config['private_key'],
                          'public-key': config['public_key'],
                          'mtu': config['mtu'],
                          'udp': True,
                          'reserved': config['reserved'],
                          'workers': 4,
                          'persistent-keepalive': config['keepalive']
                      }
                      
                      if config['addresses']:
                          for addr in config['addresses']:
                              addr_clean = addr.strip().split('/')[0] if '/' in addr else addr.strip()
                              if ':' in addr_clean:
                                  proxy['ipv6'] = addr_clean
                              else:
                                  proxy['ip'] = addr_clean
                      
                      proxies.append(proxy)
              
              output_config = BASE_CONFIG.copy()
              output_config['proxies'] = proxies
              
              for group in output_config['proxy-groups']:
                  if group['name'] in ['Load Balance', 'Auto', 'Fallback']:
                      group['proxies'] = proxy_names.copy()
              
              write_yaml(output_config, OUTPUT_FILES[i])
              print(f"Generated {OUTPUT_FILES[i]} with {len(proxies)} WireGuard proxies")

          zip_filename = "wireguard_configs.zip"
          if os.path.exists(zip_filename):
              os.remove(zip_filename)
          
          with zipfile.ZipFile(zip_filename, 'w', zipfile.ZIP_DEFLATED) as zipf:
              for i in range(1, conf_counter + 1):
                  conf_file = f"@DeltaKroneckerGithub ({i}).conf"
                  conf_path = os.path.join(CONF_DIR, conf_file)
                  if os.path.exists(conf_path):
                      zipf.write(conf_path, conf_file)
          
          print(f"Generated {zip_filename} with {conf_counter} WireGuard config files")

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Deduplicate, sort, generate Clash configs and WireGuard conf files"
          git push
