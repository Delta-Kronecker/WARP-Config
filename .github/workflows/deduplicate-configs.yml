name: Deduplicate and Sort WireGuard Configs

on:
  push:
    paths:
      - 'ALL.txt'
  workflow_dispatch:

jobs:
  process-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run deduplication and sort
        shell: python
        run: |
          import re, os

          FILES = ["ALL.txt", "MCI.txt", "MTN.txt"]

          for filename in FILES:
              if not os.path.exists(filename):
                  continue
              
              seen_endpoints = set()
              unique_configs = []
              
              with open(filename, 'r', encoding='utf-8') as f:
                  for line in f:
                      line = line.strip()
                      if not line.startswith("wireguard://"):
                          continue
                      match = re.search(r'@([^?#]+)', line)
                      if not match:
                          continue
                      endpoint = match.group(1)
                      if endpoint not in seen_endpoints:
                          seen_endpoints.add(endpoint)
                          unique_configs.append((endpoint, line))
              
              if unique_configs:
                  unique_configs.sort(key=lambda x: x[0])
                  with open(filename, 'w', encoding='utf-8') as f:
                      for _, cfg in unique_configs:
                          f.write(cfg + "\n")
                  print(f"{filename}: {len(unique_configs)} unique configs")
              else:
                  print(f"{filename}: no valid configs found (file left unchanged)")

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Remove duplicate configs and sort by endpoint within each file"
          git push
